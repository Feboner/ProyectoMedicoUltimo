      context: .
      dockerfile: Dockerfile
      args:
        MODULE_DIR: ms-gateway
    environment:
      SERVER_PORT: 8080
      AUTH_URI: http://ms-auth:8081
      PACIENTES_URI: http://ms-pacientes:8083
      PRODUCTOS_URI: http://ms-productos:8082
      PEDIDOS_URI: http://ms-pedidos:8085
      PROVEEDORES_URI: http://ms-proveedores:8087
      PAGOS_URI: http://ms-pagos:8088
      ENVIOS_URI: http://ms-envios:8089
      AUDITORIA_URI: http://ms-auditoria:8090
      RECETAS_URI: http://ms-recetas:8086
      INVENTARIO_URI: http://ms-inventario:8084
    ports:
      - "8080:8080"
    depends_on:
      - ms-auth
      - ms-pacientes
      - ms-productos
      - ms-pedidos
      - ms-proveedores
      - ms-pagos
      - ms-envios
      - ms-auditoria
      - ms-recetas
      - ms-inventario

volumes:
  mysql_data:
