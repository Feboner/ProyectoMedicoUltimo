services:
  mysql:
    image: mysql:8.0.36
    container_name: proyecto-medico-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 60s

  ms-auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_DIR: ms-auth
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_medico_auth?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

  ms-pacientes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_DIR: ms-pacientes
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db_medico_pacientes?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy

  ms-productos:
