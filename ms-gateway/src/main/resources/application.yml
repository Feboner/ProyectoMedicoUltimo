server:
  port: 8080

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: pacientes-service
          uri: ${PACIENTES_URI:http://localhost:8083}
          predicates:
            - Path=/api/pacientes/**
        - id: productos-service
          uri: ${PRODUCTOS_URI:http://localhost:8082}
          predicates:
            - Path=/api/productos/**
        - id: pedidos-service
          uri: ${PEDIDOS_URI:http://localhost:8085}
          predicates:
            - Path=/api/pedidos/**
        - id: proveedores-service
          uri: ${PROVEEDORES_URI:http://localhost:8087}
          predicates:
            - Path=/api/proveedores/**
        - id: pagos-service
          uri: ${PAGOS_URI:http://localhost:8088}
          predicates:
            - Path=/api/pagos/**
        - id: envios-service
          uri: ${ENVIOS_URI:http://localhost:8089}
          predicates:
            - Path=/api/envios/**
        - id: auditoria-service
          uri: ${AUDITORIA_URI:http://localhost:8090}
          predicates:
            - Path=/api/auditoria/**
        - id: recetas-service
          uri: ${RECETAS_URI:http://localhost:8086}
          predicates:
            - Path=/api/recetas/**
        - id: inventario-service
          uri: ${INVENTARIO_URI:http://localhost:8084}
          predicates:
            - Path=/api/inventario/**
